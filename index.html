<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="InsightMatches — AI platform connecting Korean researchers and SMEs with Horizon Europe consortium partners and EU R&D funding." />
    <meta name="theme-color" content="#73c1a0" />
    <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1" />
    <link rel="canonical" href="https://www.insightmatches.com/" />

    <!-- hreflang defaults -->
    <link rel="alternate" hreflang="en" href="https://www.insightmatches.com/" />
    <link rel="alternate" hreflang="ko" href="https://www.insightmatches.com/ko/" />
    <link rel="alternate" hreflang="x-default" href="https://www.insightmatches.com/" />

    <title>InsightMatches — AI for Horizon Europe & EU-Korea R&D Partners</title>

    <!-- Open Graph -->
    <meta property="og:title" content="InsightMatches — AI for Horizon Europe & EU-Korea R&D Partners" />
    <meta property="og:description" content="Find Horizon Europe consortium partners and EU R&D funding opportunities with AI matchmaking built for Korean researchers, universities and SMEs." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://www.insightmatches.com/" />
    <meta property="og:image" content="https://www.insightmatches.com/og-image.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="InsightMatches — AI for Horizon Europe & EU-Korea R&D" />
    <meta property="og:site_name" content="InsightMatches" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:image" content="https://www.insightmatches.com/og-image.jpg" />

    <!-- Optimized Google Fonts loading (subset to needed weights only) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">

    <!-- Performance optimizations -->
    <link rel="dns-prefetch" href="//fonts.googleapis.com">
    <link rel="dns-prefetch" href="//fonts.gstatic.com">

    <!-- JSON-LD: Organization -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "InsightMatches",
      "url": "https://www.insightmatches.com",
      "logo": "https://www.insightmatches.com/favicon.png",
      "description": "AI-powered platform connecting Korean researchers, universities and SMEs with European Horizon Europe consortium partners and R&D funding opportunities.",
      "foundingDate": "2024",
      "areaServed": ["EU", "KR", "Worldwide"],
      "knowsAbout": ["Horizon Europe", "EU R&D funding", "Consortium building", "Korea-EU research collaboration", "Grant matchmaking"],
      "sameAs": ["https://www.linkedin.com/company/insightmatches"],
      "contactPoint": [{
        "@type": "ContactPoint",
        "contactType": "customer support",
        "url": "https://www.insightmatches.com/about",
        "availableLanguage": ["English", "Korean", "French"]
      }]
    }
    </script>

    <!-- JSON-LD: WebSite -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "InsightMatches",
      "url": "https://www.insightmatches.com",
      "inLanguage": ["en", "ko", "fr"],
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://www.insightmatches.com/resources?q={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>

    <!-- JSON-LD: SoftwareApplication -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "InsightMatches",
      "applicationCategory": "BusinessApplication",
      "applicationSubCategory": "Research Funding & Consortium Matchmaking",
      "operatingSystem": "Web",
      "url": "https://www.insightmatches.com",
      "description": "AI grant platform that helps Korean and European researchers find Horizon Europe partners, identify relevant calls, and build winning consortia.",
      "featureList": [
        "AI-powered consortium partner matching",
        "Horizon Europe call discovery",
        "EU-Korea R&D collaboration intelligence",
        "SENS event matchmaking",
        "Multilingual support (EN, KO, FR)"
      ],
      "audience": {"@type": "Audience", "audienceType": "Researchers, Universities, SMEs, Research institutions"},
      "offers": {"@type": "Offer", "price": "0", "priceCurrency": "EUR", "description": "Free demo available; paid tiers for institutions."},
      "provider": {"@type": "Organization", "name": "InsightMatches", "url": "https://www.insightmatches.com"}
    }
    </script>

    <!-- JSON-LD: Service (SENS) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Service",
      "serviceType": "Event Matchmaking",
      "name": "SENS — EU-Korea R&D Event Matchmaking",
      "provider": {"@type": "Organization", "name": "InsightMatches", "url": "https://www.insightmatches.com"},
      "areaServed": ["EU", "KR"],
      "description": "AI matchmaking tool that pairs participants of EU-Korea R&D events with the most relevant collaborators based on research topics, calls and capabilities.",
      "url": "https://www.insightmatches.com/sens"
    }
    </script>

    <!-- Plausible Analytics - Privacy-friendly, GDPR compliant -->
    <script defer data-domain="insightmatches.com" src="https://plausible.io/js/script.js"></script>
    <script>
      window.plausible = window.plausible || function() { (window.plausible.q = window.plausible.q || []).push(arguments) }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
